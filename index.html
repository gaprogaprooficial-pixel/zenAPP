<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-opacity: 0.06; }
  .bubble-in { background-color: #202c33; border-radius: 0 15px 15px 15px; align-self: flex-start; }
  .bubble-out { background-color: #005c4b; border-radius: 15px 0 15px 15px; align-self: flex-end; }
  .v-gold { color: #facc15; filter: drop-shadow(0 0 3px #facc15); }
  .v-blue { color: #3b82f6; filter: drop-shadow(0 0 3px #3b82f6); }
  .v-green { color: #22c55e; filter: drop-shadow(0 0 3px #22c55e); }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">
  
  <div id="lock-screen" class="hidden fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center text-center p-6">
      <h1 id="lock-title" class="text-4xl font-black text-red-600 mb-2 uppercase italic tracking-tighter">ACCESO DENEGADO</h1>
      <p id="lock-msg" class="text-slate-500 font-bold uppercase text-xs tracking-widest"></p>
  </div>

  <div id="app">
    <div id="login-screen" class="h-screen flex flex-col items-center justify-center bg-[#111b21]">
      <h1 class="text-6xl font-black text-[#00a884] mb-8 uppercase italic tracking-tighter">ZENAPP</h1>
      <div class="bg-[#222e35] p-8 rounded-3xl w-[380px] shadow-2xl border-b-4 border-[#00a884]">
        <input type="text" id="login-user" placeholder="Usuario" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-4 text-white placeholder-slate-500">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-6 text-white placeholder-slate-500">
        <button onclick="auth()" class="w-full bg-[#00a884] py-4 rounded-xl font-black text-[#111b21] uppercase hover:brightness-110 active:scale-95">Entrar</button>
      </div>
    </div>

    <div id="chat-interface" class="hidden h-screen flex bg-[#111b21]">
      <aside class="w-[400px] border-r border-white/5 flex flex-col bg-[#111b21]">
        <header class="p-4 bg-[#202c33] flex justify-between items-center border-b border-black/20 shadow-md">
            <div class="flex items-center gap-3">
                <img id="my-avatar" onclick="openAdminPanel()" class="w-12 h-12 rounded-full cursor-pointer border-2 border-[#00a884] hover:opacity-80 transition-all">
                <div>
                    <div class="flex items-center gap-1">
                        <p id="my-name-display" class="text-sm font-bold text-white"></p>
                        <span id="my-badges" class="flex gap-0.5"></span>
                    </div>
                    <p id="my-id-display" class="text-[10px] text-[#00a884] font-black uppercase tracking-widest"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-500 text-[10px] font-black uppercase hover:text-white">Salir</button>
        </header>

        <div class="p-4 bg-[#111b21] border-b border-white/5">
            <div class="flex gap-2">
                <input type="text" id="id-search" placeholder="ID (ZEN-XXXX)" class="flex-1 p-3 bg-[#2a3942] rounded-xl text-xs outline-none text-white focus:ring-1 ring-[#00a884]">
                <button onclick="searchUser()" class="bg-[#00a884] px-4 rounded-xl text-[10px] font-black text-black uppercase">Buscar</button>
            </div>
            <div id="search-result" class="mt-2 hidden p-3 bg-[#202c33] rounded-xl flex items-center justify-between border border-white/5"></div>
        </div>

        <div class="p-4 bg-[#1c282f] m-2 rounded-2xl border border-[#00a884]/20 shadow-xl">
            <p class="text-[10px] font-black text-yellow-500 uppercase mb-2 italic">🛒 COMPRAR VERIFICADO</p>
            <div class="flex flex-col gap-2">
                <select id="shop-type" class="bg-[#2a3942] text-[10px] p-2 rounded-lg text-white border-none outline-none cursor-pointer">
                    <option value="gold">V. DORADO (ADMIN)</option>
                    <option value="green">V. VERDE (VIP)</option>
                    <option value="blue">V. AZUL (USUARIO)</option>
                </select>
                <div class="flex gap-1">
                    <input type="text" id="promo-code" placeholder="SERIAL (123-ABC-123)" class="flex-1 bg-[#111b21] text-[10px] p-2 rounded-lg outline-none uppercase border border-white/5">
                    <button onclick="redeemSerial()" class="bg-yellow-500 text-black px-3 rounded-lg text-[9px] font-black hover:scale-105 active:scale-95 transition-all">CANJEAR</button>
                </div>
                <p id="shop-status" class="text-[8px] uppercase font-bold text-center"></p>
            </div>
        </div>

        <div id="chats-list" class="flex-1 overflow-y-auto"></div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper">
        <div id="no-chat" class="flex-1 flex items-center justify-center text-slate-500 font-black text-[10px] uppercase tracking-[0.5em] opacity-40">ZenApp Communication Hub</div>
        <div id="active-chat" class="hidden flex-1 flex flex-col h-full">
            <header class="p-4 bg-[#202c33] flex items-center justify-between shadow-lg">
                <div class="flex items-center gap-4">
                    <div id="target-avatar-ui" class="w-10 h-10"></div>
                    <div>
                        <div class="flex items-center gap-1"><span id="target-name" class="font-bold text-white"></span><span id="target-badges" class="flex gap-0.5"></span></div>
                        <span id="target-id" class="text-[9px] text-[#00a884] font-black uppercase tracking-widest"></span>
                    </div>
                </div>
            </header>
            <div id="messages-flow" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3"></div>
            <div class="p-4 bg-[#202c33] flex gap-4 border-t border-white/5">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." class="flex-1 p-3 bg-[#2a3942] rounded-xl outline-none text-white text-sm">
                <button onclick="sendMsg()" class="bg-[#00a884] text-black font-black px-6 rounded-xl text-[10px] uppercase shadow-md active:scale-95">Enviar</button>
            </div>
        </div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/98 z-[1000] flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
            <div>
                <h2 class="text-[#00a884] font-black text-4xl uppercase italic">PANEL MAESTRO</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">Gestión Profesional de Usuarios</p>
            </div>
            <div class="flex gap-4">
                <button id="maint-btn" onclick="toggleMaint()" class="px-6 py-3 rounded-xl text-[10px] text-white font-black uppercase transition-all"></button>
                <button onclick="closeAdmin()" class="bg-white/10 px-8 py-3 rounded-xl text-[10px] text-white font-black uppercase hover:bg-white/20">Cerrar</button>
            </div>
        </header>
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4 pr-4"></div>
    </div>
  </div>

<script>
// CONFIGURACIÓN PRIVADA
const MASTER_KEY = "ZM_X99_ROOT_#SECURITY_2026";
const MASTER_ID = "123-abc";
const ICONS = {
    gold: '<svg class="w-4 h-4 v-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.64.304 1.24.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>',
    blue: '<svg class="w-4 h-4 v-blue" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293l-4 4a1 1 0 01-1.414 0l-2-2a1 1 0 111.414-1.414L9 10.586l3.293-3.293a1 1 0 111.414 1.414z"></path></svg>',
    green: '<svg class="w-4 h-4 v-green" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"></path></svg>'
};

let users = JSON.parse(localStorage.getItem('zen_u')) || [];
let messages = JSON.parse(localStorage.getItem('zen_m')) || [];
let maint = JSON.parse(localStorage.getItem('zen_mt')) || false;
let usedCodes = JSON.parse(localStorage.getItem('zen_codes')) || [];
let me = null, talkingTo = null;

// CREAR ADMIN AUTOMÁTICO (SOLO UNA VEZ)
if (!users.find(u => u.id === MASTER_ID)) {
    users.push({ id: MASTER_ID, name: "Admin", pass: "root", badges: {gold:true,green:true,blue:true}, photo: "https://ui-avatars.com/api/?name=Admin&background=00a884&color=fff", isBan: false });
    save();
}

function save() {
    localStorage.setItem('zen_u', JSON.stringify(users));
    localStorage.setItem('zen_m', JSON.stringify(messages));
    localStorage.setItem('zen_mt', JSON.stringify(maint));
    localStorage.setItem('zen_codes', JSON.stringify(usedCodes));
}

// LOGIN
function auth() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(!u || !p) return;
    let found = users.find(x => x.name.toLowerCase() === u.toLowerCase() && x.pass === p);
    if(found) { 
        if(found.isBan) return alert("❌ TU CUENTA ESTÁ BANEADA");
        me = found; 
    } else {
        me = { id: "ZEN-"+Math.floor(1000+Math.random()*9000), name: u, pass: p, badges: {}, photo: "https://ui-avatars.com/api/?name="+u+"&background=random&color=fff", isBan: false };
        users.push(me);
    }
    save();
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-interface').classList.remove('hidden');
    document.getElementById('my-name-display').innerText = me.name;
    document.getElementById('my-id-display').innerText = me.id;
    document.getElementById('my-avatar').src = me.photo;
    renderChats();
}

// TIENDA (CUALQUIER SERIAL 123-ABC-123 FUNCIONA)
function redeemSerial() {
    const serial = document.getElementById('promo-code').value.trim().toUpperCase();
    const type = document.getElementById('shop-type').value;
    const status = document.getElementById('shop-status');
    const regex = /^\d{3}-[A-Z]{3}-\d{3}$/;

    if (!regex.test(serial)) { status.innerText = "FORMATO INCORRECTO"; status.style.color = "red"; return; }
    if (usedCodes.includes(serial)) { status.innerText = "SERIAL YA USADO"; status.style.color = "red"; return; }

    let uNow = users.find(x => x.id === me.id);
    if(!uNow.badges) uNow.badges = {};
    uNow.badges[type] = true;
    usedCodes.push(serial);
    save();
    status.innerText = "✅ ¡COMPRA EXITOSA!";
    status.style.color = "#22c55e";
    document.getElementById('promo-code').value = "";
}

// BUSCADOR
function searchUser() {
    const query = document.getElementById('id-search').value.trim();
    const res = document.getElementById('search-result');
    const u = users.find(x => x.id === query);
    if(u && u.id !== me.id) {
        res.classList.remove('hidden');
        res.innerHTML = `<div class="flex items-center gap-2"><img src="${u.photo}" class="w-8 h-8 rounded-full"><span class="text-xs font-bold text-white">${u.name} ${getBadges(u)}</span></div><button onclick="openChat('${u.id}')" class="bg-[#00a884] text-black text-[9px] px-3 py-1 rounded font-black active:scale-90">CHAT</button>`;
    } else { alert("ID no encontrado"); res.classList.add('hidden'); }
}

function openChat(id) {
    talkingTo = id;
    const u = users.find(x => x.id === id);
    document.getElementById('no-chat').classList.add('hidden');
    document.getElementById('active-chat').classList.remove('hidden');
    document.getElementById('target-name').innerText = u.name;
    document.getElementById('target-id').innerText = u.id;
    document.getElementById('target-badges').innerHTML = getBadges(u);
    document.getElementById('target-avatar-ui').innerHTML = `<img src="${u.photo}" class="w-full h-full rounded-full">`;
    renderMsgs();
}

function sendMsg() {
    const i = document.getElementById('msg-input');
    if(!i.value.trim()) return;
    messages.push({ from: me.id, to: talkingTo, text: i.value.trim() });
    i.value = ""; save(); renderMsgs();
}

function renderMsgs() {
    const flow = document.getElementById('messages-flow');
    const conv = messages.filter(m => (m.from === me.id && m.to === talkingTo) || (m.from === talkingTo && m.to === me.id));
    flow.innerHTML = conv.map(m => `<div class="flex flex-col ${m.from === me.id ? 'items-end' : 'items-start'} animate-fade-in"><div class="${m.from === me.id ? 'bubble-out' : 'bubble-in'} p-3 max-w-[80%] text-sm text-white shadow-md">${m.text}</div></div>`).join('');
    flow.scrollTop = flow.scrollHeight;
}

function renderChats() {
    const list = document.getElementById('chats-list');
    const contacts = [...new Set(messages.filter(m => m.to === me.id || m.from === me.id).map(m => m.from === me.id ? m.to : m.from))];
    list.innerHTML = contacts.map(cid => {
        const u = users.find(x => x.id === cid);
        if(!u) return '';
        return `<div onclick="openChat('${u.id}')" class="p-4 flex items-center gap-3 hover:bg-[#202c33] cursor-pointer border-b border-white/5 ${talkingTo === u.id ? 'bg-[#202c33]' : ''}"><img src="${u.photo}" class="w-10 h-10 rounded-full"><div><p class="text-white text-sm font-bold flex items-center gap-1">${u.name} ${getBadges(u)}</p><p class="text-[9px] text-slate-500 font-black uppercase">${u.id}</p></div></div>`;
    }).join('');
}

// ADMIN PANEL
function openAdminPanel() { if(prompt("CLAVE MAESTRA:") === MASTER_KEY) { renderAdmin(); document.getElementById('admin-modal').classList.remove('hidden'); } }
function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
function toggleMaint() { maint = !maint; save(); renderAdmin(); }

function renderAdmin() {
    const mBtn = document.getElementById('maint-btn');
    mBtn.innerText = maint ? "MODO MANTENIMIENTO: ON" : "MODO MANTENIMIENTO: OFF";
    mBtn.className = maint ? "bg-green-600 px-6 py-3 rounded-xl text-[10px] text-white font-black" : "bg-red-600 px-6 py-3 rounded-xl text-[10px] text-white font-black";

    document.getElementById('admin-list').innerHTML = users.map(u => `
        <div class="p-5 bg-[#202c33] rounded-3xl border border-white/10 flex flex-col gap-5">
            <div class="flex items-center justify-between">
                <div class="flex gap-4 items-center">
                    <img src="${u.photo}" class="w-14 h-14 rounded-full border-2 ${u.id===MASTER_ID?'border-yellow-500':'border-transparent'}">
                    <div>
                        <input onchange="editU('${u.id}','name',this.value)" value="${u.name}" class="bg-transparent text-white font-bold outline-none border-b border-[#00a884] block w-32">
                        <input onchange="editU('${u.id}','pass',this.value)" value="${u.pass}" class="bg-transparent text-[10px] text-slate-500 outline-none block w-32">
                        <span class="text-[9px] text-[#00a884] font-black uppercase">${u.id}</span>
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <button onclick="ban('${u.id}',true)" class="bg-red-600 text-[8px] px-4 py-1.5 rounded-lg font-black hover:brightness-125">BANEAR</button>
                    <button onclick="ban('${u.id}',false)" class="bg-green-600 text-[8px] px-4 py-1.5 rounded-lg font-black hover:brightness-125">QUITAR BAN</button>
                </div>
            </div>
            <div class="flex justify-between items-center bg-black/40 p-3 rounded-xl">
                <p class="text-[10px] font-black uppercase text-slate-400">RANGOS:</p>
                <div class="flex gap-5">
                    <button onclick="tg('${u.id}','gold')" class="${u.badges?.gold?'text-yellow-500':'text-slate-700'} hover:scale-125 transition-transform">${ICONS.gold}</button>
                    <button onclick="tg('${u.id}','green')" class="${u.badges?.green?'text-green-500':'text-slate-700'} hover:scale-125 transition-transform">${ICONS.green}</button>
                    <button onclick="tg('${u.id}','blue')" class="${u.badges?.blue?'text-blue-500':'text-slate-700'} hover:scale-125 transition-transform">${ICONS.blue}</button>
                </div>
            </div>
        </div>
    `).join('');
}

function editU(id,k,v) { let u = users.find(x=>x.id===id); if(u) u[k]=v; save(); }
function ban(id,st) { if(id===MASTER_ID) return alert("ADMIN NO BANEABLE"); let u = users.find(x=>x.id===id); u.isBan=st; save(); renderAdmin(); }
function tg(id,t) { let u = users.find(x=>x.id===id); if(!u.badges) u.badges={}; u.badges[t]=!u.badges[t]; save(); renderAdmin(); }
function getBadges(u) { if(!u || !u.badges) return ''; return (u.badges.gold?ICONS.gold:'')+(u.badges.green?ICONS.green:'')+(u.badges.blue?ICONS.blue:''); }

// BUCLE DE SEGURIDAD
setInterval(() => {
    if(!me) return;
    const mt = JSON.parse(localStorage.getItem('zen_mt'));
    const us = JSON.parse(localStorage.getItem('zen_u'));
    const cur = us.find(x=>x.id===me.id);
    if(me.id !== MASTER_ID && (mt || cur.isBan)) {
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-msg').innerText = cur.isBan ? "TU CUENTA HA SIDO BANEADA" : "ESTAMOS EN MANTENIMIENTO";
    } else { document.getElementById('lock-screen').classList.add('hidden'); }
    document.getElementById('my-badges').innerHTML = getBadges(cur);
    renderChats();
}, 2500);
</script>
</body>
