<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { 
    background-color: #0b141a;
    background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); 
    background-blend-mode: overlay;
    background-opacity: 0.06; 
  }
  .bubble-in { background-color: #202c33; border-radius: 0 15px 15px 15px; align-self: flex-start; }
  .bubble-out { background-color: #005c4b; border-radius: 15px 0 15px 15px; align-self: flex-end; }
  .v-gold { color: #facc15; filter: drop-shadow(0 0 3px #facc15); }
  .v-blue { color: #3b82f6; filter: drop-shadow(0 0 3px #3b82f6); }
  .v-green { color: #22c55e; filter: drop-shadow(0 0 3px #22c55e); }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">
  
  <div id="maint-screen" class="hidden fixed inset-0 bg-black z-[5000] flex flex-col items-center justify-center text-center p-6">
      <h1 class="text-5xl font-black text-red-600 mb-4 uppercase italic tracking-tighter">SISTEMA CERRADO</h1>
      <p class="text-slate-400 text-xl font-bold uppercase">Mantenimiento Global en curso</p>
  </div>

  <div id="app">
    <div id="login-screen" class="h-screen flex flex-col items-center justify-center bg-[#111b21]">
      <h1 class="text-5xl font-black text-[#00a884] mb-8 uppercase italic tracking-widest">ZenMail</h1>
      <div class="bg-[#222e35] p-8 rounded-3xl w-[380px] shadow-2xl border-t-4 border-[#00a884]">
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Usuario</label>
        <input type="text" id="login-user" value="Admin" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-4 text-white border border-transparent focus:border-[#00a884]">
        
        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Contraseña</label>
        <input type="password" id="login-pass" value="root" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-6 text-white border border-transparent focus:border-[#00a884]">
        
        <button onclick="auth()" class="w-full bg-[#00a884] py-4 rounded-xl font-black text-[#111b21] uppercase hover:bg-[#06cf9c] transition-all active:scale-95 shadow-lg shadow-[#00a884]/20">
            Entrar al Sistema
        </button>
      </div>
      <p class="mt-6 text-[10px] text-slate-500 uppercase tracking-widest font-bold">Admin: Admin / Pass: root</p>
    </div>

    <div id="chat-interface" class="hidden h-screen flex bg-[#111b21]">
      <aside class="w-[380px] border-r border-white/5 flex flex-col bg-[#111b21]">
        <header class="p-4 bg-[#202c33] flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <img id="my-avatar" onclick="openAdminPanel()" class="w-11 h-11 rounded-full cursor-pointer object-cover border-2 border-[#00a884] hover:brightness-125 transition-all">
                <div>
                    <div class="flex items-center gap-1">
                        <p id="my-name-display" class="text-sm font-bold text-white"></p>
                        <span id="my-badges" class="flex gap-0.5"></span>
                    </div>
                    <p id="my-id-display" class="text-[10px] text-[#00a884] font-black uppercase tracking-tighter"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-white p-2">❌</button>
        </header>
        <div id="chats-list" class="flex-1 overflow-y-auto"></div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper">
        <header id="chat-header" class="hidden p-4 bg-[#202c33] flex items-center justify-between border-l border-white/5 shadow-lg">
            <div class="flex items-center gap-4">
                <div id="target-avatar" class="w-10 h-10 rounded-full"></div>
                <div class="flex flex-col">
                    <div class="flex items-center gap-1">
                        <span id="target-name" class="font-bold text-white text-base"></span>
                        <span id="target-badges" class="flex gap-0.5"></span>
                    </div>
                    <span id="target-id-label" class="text-[9px] text-slate-400 font-black"></span>
                </div>
            </div>
        </header>
        <div id="messages-flow" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3"></div>
        <div id="chat-input-bar" class="hidden p-4 bg-[#202c33] flex items-center gap-4 border-t border-white/5">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." class="flex-1 p-3 bg-[#2a3942] rounded-xl outline-none text-white text-sm">
            <button onclick="send()" class="bg-[#00a884] text-[#111b21] font-black px-6 py-2 rounded-xl uppercase text-xs">Enviar</button>
        </div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/95 z-[1000] flex flex-col p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-[#00a884] font-black text-3xl uppercase italic tracking-tighter">Panel de Control</h2>
                <p class="text-slate-500 text-xs font-bold uppercase">Gestión de Usuarios y Estado Global</p>
            </div>
            <div class="flex gap-4">
                <button id="global-maint-btn" onclick="toggleGlobalMaint()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-xs text-white font-black uppercase shadow-lg shadow-red-900/20">
                    Cargando...
                </button>
                <button onclick="closeAdmin()" class="bg-white/10 px-6 py-3 rounded-xl text-xs text-white font-black uppercase hover:bg-white/20">Cerrar</button>
            </div>
        </header>
        <div id="admin-list-container" class="flex-1 overflow-y-auto space-y-4 pr-4"></div>
    </div>
  </div>

  <script>
    // CREDENCIALES
    const ADMIN_PASS = "ZM_X99_ROOT_#SECURITY_2026";
    const MASTER_ID = "123-abc";
    
    // ICONOS SVG
    const ICONS = {
        gold: '<svg class="w-4 h-4 v-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.64.304 1.24.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>',
        blue: '<svg class="w-4 h-4 v-blue" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293l-4 4a1 1 0 01-1.414 0l-2-2a1 1 0 111.414-1.414L9 10.586l3.293-3.293a1 1 0 111.414 1.414z"></path></svg>',
        green: '<svg class="w-4 h-4 v-green" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"></path></svg>'
    };

    let users, messages, globalMaint, me = null, talkingTo = null;

    // CARGA DE BASE DE DATOS MEJORADA
    function setup() {
        try {
            users = JSON.parse(localStorage.getItem('za_u')) || [];
            messages = JSON.parse(localStorage.getItem('za_m')) || [];
            globalMaint = JSON.parse(localStorage.getItem('za_g')) || false;

            // Asegurar Admin
            if (!users.find(u => u.id === MASTER_ID)) {
                users.push({ 
                    id: MASTER_ID, name: "Admin", pass: "root", 
                    badges: {gold: true, blue: true, green: true}, 
                    photo: "https://ui-avatars.com/api/?name=Admin&background=00a884&color=fff",
                    isMaint: false, banned: false
                });
                save();
            }
        } catch(e) { localStorage.clear(); location.reload(); }
    }

    function save() {
        localStorage.setItem('za_u', JSON.stringify(users));
        localStorage.setItem('za_m', JSON.stringify(messages));
        localStorage.setItem('za_g', JSON.stringify(globalMaint));
    }

    function auth() {
        setup();
        const u = document.getElementById('login-user').value.trim();
        const p = document.getElementById('login-pass').value.trim();
        
        let found = users.find(x => x.name.toLowerCase() === u.toLowerCase() && x.pass === p);
        
        if (found) {
            if (found.banned) return alert("CUENTA BANEADA");
            me = found;
        } else {
            const nid = "ZEN-" + Math.floor(1000 + Math.random() * 9000);
            me = { id: nid, name: u, pass: p, badges: {}, photo: `https://ui-avatars.com/api/?name=${u}&background=random`, isMaint: false, banned: false };
            users.push(me);
            save();
        }
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('chat-interface').classList.remove('hidden');
        document.getElementById('my-name-display').innerText = me.name;
        document.getElementById('my-id-display').innerText = me.id;
        document.getElementById('my-avatar').src = me.photo;
        renderChats();
    }

    setInterval(() => {
        if (!me) return;
        users = JSON.parse(localStorage.getItem('za_u'));
        globalMaint = JSON.parse(localStorage.getItem('za_g'));
        let uNow = users.find(x => x.id === me.id);
        
        // Bloqueo Global
        if (me.id !== MASTER_ID && (globalMaint || uNow.isMaint)) {
            document.getElementById('maint-screen').classList.remove('hidden');
        } else {
            document.getElementById('maint-screen').classList.add('hidden');
        }

        document.getElementById('my-badges').innerHTML = (uNow.badges?.gold?ICONS.gold:'') + (uNow.badges?.blue?ICONS.blue:'') + (uNow.badges?.green?ICONS.green:'');
        if (talkingTo) renderMsgs();
        renderChats();
    }, 1000);

    function toggleGlobalMaint() {
        globalMaint = !globalMaint;
        save();
        alert(globalMaint ? "MANTENIMIENTO GLOBAL ACTIVADO" : "SISTEMA ABIERTO");
        renderAdmin();
    }

    function renderAdmin() {
        document.getElementById('global-maint-btn').innerText = globalMaint ? "QUITAR MANT. GLOBAL" : "MANTENIMIENTO GLOBAL";
        document.getElementById('admin-list-container').innerHTML = users.map(u => `
            <div class="p-5 bg-[#202c33] rounded-2xl flex items-center justify-between border border-white/5">
                <div class="flex items-center gap-4">
                    <img src="${u.photo}" class="w-12 h-12 rounded-full border-2 ${u.id===MASTER_ID?'border-yellow-500':'border-transparent'}">
                    <div>
                        <p class="text-white font-bold">${u.name} <span class="text-yellow-500 text-[10px]">(${u.pass})</span></p>
                        <div class="flex gap-2 mt-2">
                            <button onclick="tag('${u.id}','gold')" class="${u.badges?.gold?'bg-yellow-500 text-black shadow-lg shadow-yellow-500/20':'bg-black/40 text-white'} px-3 py-1 rounded-lg text-[9px] font-black uppercase">ADMIN</button>
                            <button onclick="tag('${u.id}','green')" class="${u.badges?.green?'bg-green-500 text-black':'bg-black/40 text-white'} px-3 py-1 rounded-lg text-[9px] font-black uppercase">VIP</button>
                            <button onclick="tag('${u.id}','blue')" class="${u.badges?.blue?'bg-blue-500 text-black':'bg-black/40 text-white'} px-3 py-1 rounded-lg text-[9px] font-black uppercase">AZUL</button>
                        </div>
                    </div>
                </div>
                ${u.id !== MASTER_ID ? `
                <div class="flex gap-2">
                    <button onclick="oneMaint('${u.id}')" class="bg-red-500/20 border border-red-500 text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold">${u.isMaint?'LIBERAR':'BLOQUEAR'}</button>
                    <button onclick="oneBan('${u.id}')" class="bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-bold text-white">${u.banned?'QUITAR BAN':'BANEAR'}</button>
                </div>` : '<span class="text-yellow-500 font-black text-xs italic">MAESTRO</span>'}
            </div>
        `).join('');
    }

    function tag(id, t) {
        let u = users.find(x => x.id === id);
        if(!u.badges) u.badges = {};
        u.badges[t] = !u.badges[t];
        save(); renderAdmin();
    }

    function oneMaint(id) { let u = users.find(x => x.id === id); u.isMaint = !u.isMaint; save(); renderAdmin(); }
    function oneBan(id) { let u = users.find(x => x.id === id); u.banned = !u.banned; save(); renderAdmin(); }
    
    function openAdminPanel() { 
        if(prompt("PASSWORD MAESTRO:") === ADMIN_PASS) { 
            renderAdmin(); 
            document.getElementById('admin-modal').classList.remove('hidden'); 
        } 
    }
    
    function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

    function openChat(id) {
        talkingTo = id; const t = users.find(x => x.id === id);
        document.getElementById('chat-header').classList.remove('hidden');
        document.getElementById('chat-input-bar').classList.remove('hidden');
        document.getElementById('target-name').innerText = t.name;
        document.getElementById('target-id-label').innerText = t.id;
        document.getElementById('target-badges').innerHTML = (t.badges?.gold?ICONS.gold:'') + (t.badges?.blue?ICONS.blue:'') + (t.badges?.green?ICONS.green:'');
        document.getElementById('target-avatar').innerHTML = `<img src="${t.photo}" class="w-full h-full rounded-full">`;
        renderMsgs();
    }

    function send() {
        const i = document.getElementById('msg-input'); if(!i.value.trim()) return;
        messages.push({ from: me.id, to: talkingTo, text: i.value.trim() });
        i.value = ""; save(); renderMsgs();
    }

    function renderMsgs() {
        const flow = document.getElementById('messages-flow');
        const conv = messages.filter(m => (m.from === me.id && m.to === talkingTo) || (m.from === talkingTo && m.to === me.id));
        flow.innerHTML = conv.map(m => `
            <div class="flex flex-col ${m.from === me.id ? 'items-end' : 'items-start'}">
                <div class="p-3.5 max-w-[85%] ${m.from === me.id ? 'bubble-out text-white' : 'bubble-in text-white'} shadow-sm">
                    <p class="text-[13px] leading-relaxed">${m.text}</p>
                </div>
            </div>
        `).join('');
        flow.scrollTop = flow.scrollHeight;
    }

    function renderChats() {
        const list = document.getElementById('chats-list');
        const contacts = [...new Set(messages.filter(m => m.to === me.id || m.from === me.id).map(m => m.from === me.id ? m.to : m.from))];
        list.innerHTML = contacts.map(cid => {
            const u = users.find(x => x.id === cid); if(!u) return '';
            const b = (u.badges?.gold?ICONS.gold:'') + (u.badges?.blue?ICONS.blue:'') + (u.badges?.green?ICONS.green:'');
            return `<div onclick="openChat('${u.id}')" class="p-4 flex items-center gap-4 hover:bg-[#202c33] cursor-pointer border-b border-white/5">
                <img src="${u.photo}" class="w-12 h-12 rounded-full">
                <div><p class="text-white text-sm font-bold flex items-center gap-1">${u.name} ${b}</p><p class="text-[10px] text-slate-500 uppercase">${u.id}</p></div>
            </div>`;
        }).join('');
    }

    // ARRANQUE LIMPIO
    setup();
  </script>
</body>
