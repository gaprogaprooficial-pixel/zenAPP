<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-opacity: 0.06; }
  .bubble-in { background-color: #202c33; border-radius: 0 15px 15px 15px; align-self: flex-start; border: 1px solid rgba(255,255,255,0.05); }
  .bubble-out { background-color: #005c4b; border-radius: 15px 0 15px 15px; align-self: flex-end; }
  .v-gold { color: #facc15; filter: drop-shadow(0 0 3px #facc15); }
  .v-blue { color: #3b82f6; filter: drop-shadow(0 0 3px #3b82f6); }
  .v-green { color: #22c55e; filter: drop-shadow(0 0 3px #22c55e); }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">
  
  <div id="maint-screen" class="hidden fixed inset-0 bg-black z-[9999] flex flex-col items-center justify-center text-center p-6">
      <div class="animate-pulse mb-4 text-red-600">⚠️</div>
      <h1 class="text-4xl font-black text-red-600 mb-2 uppercase italic">SISTEMA EN MANTENIMIENTO</h1>
      <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Vuelve más tarde - Solo Admins permitidos</p>
  </div>

  <div id="app">
    <div id="login-screen" class="h-screen flex flex-col items-center justify-center bg-[#111b21]">
      <h1 class="text-6xl font-black text-[#00a884] mb-8 uppercase italic tracking-tighter">ZENAPP</h1>
      <div class="bg-[#222e35] p-8 rounded-3xl w-[380px] shadow-2xl border-b-4 border-[#00a884]">
        <input type="text" id="login-user" placeholder="Nombre de Usuario" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-4 text-white placeholder-slate-500">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-6 text-white placeholder-slate-500">
        <button onclick="auth()" class="w-full bg-[#00a884] py-4 rounded-xl font-black text-[#111b21] uppercase hover:brightness-110 active:scale-95 transition-all">Entrar al Sistema</button>
      </div>
      <p class="mt-4 text-[10px] text-slate-600 font-bold uppercase tracking-widest">Admin ID: 123-abc | Pass: root</p>
    </div>

    <div id="chat-interface" class="hidden h-screen flex bg-[#111b21]">
      <aside class="w-[400px] border-r border-white/5 flex flex-col bg-[#111b21]">
        <header class="p-4 bg-[#202c33] flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img id="my-avatar" onclick="openAdminPanel()" class="w-12 h-12 rounded-full cursor-pointer object-cover border-2 border-[#00a884] hover:scale-105 transition-transform">
                    <div id="my-status" class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#202c33] rounded-full"></div>
                </div>
                <div>
                    <div class="flex items-center gap-1">
                        <p id="my-name-display" class="text-sm font-bold text-white"></p>
                        <span id="my-badges" class="flex gap-0.5"></span>
                    </div>
                    <p id="my-id-display" class="text-[10px] text-[#00a884] font-black uppercase tracking-tighter"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="text-slate-500 hover:text-white text-xs font-black uppercase">Salir</button>
        </header>

        <div class="p-4 bg-[#111b21] border-b border-white/5">
            <div class="flex gap-2">
                <input type="text" id="id-search" placeholder="Buscar ID (ZEN-XXXX)" class="flex-1 p-3 bg-[#2a3942] rounded-xl text-xs outline-none text-white border border-transparent focus:border-[#00a884]">
                <button onclick="searchUser()" class="bg-[#00a884] px-4 rounded-xl text-[10px] font-black text-black uppercase">Buscar</button>
            </div>
            <div id="search-result" class="mt-2 hidden p-3 bg-[#202c33] rounded-xl flex items-center justify-between animate-fade-in">
                </div>
        </div>

        <div id="chats-list" class="flex-1 overflow-y-auto"></div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper">
        <div id="no-chat" class="flex-1 flex flex-col items-center justify-center text-slate-500 italic uppercase">
            <p class="text-[10px] font-black tracking-[0.5em] mb-2 opacity-20">ZenApp Secure Protocol</p>
            <p class="text-xs">Busca un ID para iniciar comunicación</p>
        </div>

        <div id="active-chat" class="hidden flex-1 flex flex-col h-full">
            <header class="p-4 bg-[#202c33] flex items-center justify-between border-l border-white/5 shadow-lg">
                <div class="flex items-center gap-4">
                    <div id="target-avatar-ui" class="w-10 h-10"></div>
                    <div>
                        <div class="flex items-center gap-1">
                            <span id="target-name" class="font-bold text-white"></span>
                            <span id="target-badges" class="flex gap-0.5"></span>
                        </div>
                        <span id="target-id" class="text-[9px] text-[#00a884] font-black uppercase tracking-widest"></span>
                    </div>
                </div>
            </header>
            <div id="messages-flow" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3"></div>
            <div class="p-4 bg-[#202c33] flex items-center gap-4 border-t border-white/5">
                <input type="text" id="msg-input" placeholder="Escribe un mensaje..." class="flex-1 p-3 bg-[#2a3942] rounded-xl outline-none text-white text-sm">
                <button onclick="sendMsg()" class="bg-[#00a884] text-[#111b21] font-black px-6 py-2 rounded-xl uppercase text-xs">Enviar</button>
            </div>
        </div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/98 z-[1000] flex flex-col p-8 overflow-hidden">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-6">
            <div>
                <h2 class="text-[#00a884] font-black text-4xl uppercase italic tracking-tighter">Panel Maestro</h2>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em]">Gestión total de usuarios y sistema</p>
            </div>
            <div class="flex gap-4">
                <button id="maint-toggle-btn" onclick="toggleGlobalMaint()" class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl text-[10px] text-white font-black uppercase shadow-lg shadow-red-900/40">
                    Cargando...
                </button>
                <button onclick="closeAdmin()" class="bg-white/10 px-8 py-3 rounded-xl text-[10px] text-white font-black uppercase hover:bg-white/20">Cerrar</button>
            </div>
        </header>
        
        <div id="admin-list" class="flex-1 overflow-y-auto space-y-4 pr-4">
            </div>
    </div>
  </div>

<script>
// CONFIGURACIÓN E ICONOS
const MASTER_KEY = "ZM_X99_ROOT_#SECURITY_2026";
const MASTER_ID = "123-abc";

const ICONS = {
    gold: '<svg class="w-4 h-4 v-gold" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.64.304 1.24.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>',
    blue: '<svg class="w-4 h-4 v-blue" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293l-4 4a1 1 0 01-1.414 0l-2-2a1 1 0 111.414-1.414L9 10.586l3.293-3.293a1 1 0 111.414 1.414z"></path></svg>',
    green: '<svg class="w-4 h-4 v-green" fill="currentColor" viewBox="0 0 20 20"><path d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"></path></svg>'
};

// DATA
let users = JSON.parse(localStorage.getItem('za_users')) || [];
let messages = JSON.parse(localStorage.getItem('za_messages')) || [];
let globalMaint = JSON.parse(localStorage.getItem('za_maint')) || false;
let me = null;
let talkingTo = null;

// Asegurar Admin Inicial
if (!users.find(u => u.id === MASTER_ID)) {
    users.push({ 
        id: MASTER_ID, name: "Admin", pass: "root", 
        badges: {gold: true, blue: true, green: true}, 
        photo: "https://ui-avatars.com/api/?name=Admin&background=00a884&color=fff",
        isBanned: false, banUntil: null 
    });
    save();
}

function save() {
    localStorage.setItem('za_users', JSON.stringify(users));
    localStorage.setItem('za_messages', JSON.stringify(messages));
    localStorage.setItem('za_maint', JSON.stringify(globalMaint));
}

// AUTENTICACIÓN
function auth() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(!u || !p) return;

    let found = users.find(x => x.name.toLowerCase() === u.toLowerCase() && x.pass === p);
    
    if (found) {
        if (found.isBanned && (found.banUntil === "perm" || new Date(found.banUntil) > new Date())) {
            alert("ESTA CUENTA ESTÁ BANEADA: " + (found.banUntil === "perm" ? "PERMANENTE" : "HASTA " + found.banUntil));
            return;
        }
        me = found;
    } else {
        me = { 
            id: "ZEN-" + Math.floor(1000 + Math.random() * 9000), 
            name: u, pass: p, badges: {}, 
            photo: "https://ui-avatars.com/api/?name=" + u + "&background=random",
            isBanned: false, banUntil: null
        };
        users.push(me);
    }
    save();
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-interface').classList.remove('hidden');
    document.getElementById('my-name-display').innerText = me.name;
    document.getElementById('my-id-display').innerText = me.id;
    document.getElementById('my-avatar').src = me.photo;
    renderChats();
}

// BUSCADOR
function searchUser() {
    const query = document.getElementById('id-search').value.trim();
    const resultDiv = document.getElementById('search-result');
    const user = users.find(u => u.id === query);

    if (user && user.id !== me.id) {
        resultDiv.classList.remove('hidden');
        resultDiv.innerHTML = `
            <div class="flex items-center gap-3">
                <img src="${user.photo}" class="w-8 h-8 rounded-full">
                <div>
                    <p class="text-xs font-bold text-white flex items-center gap-1">${user.name} ${getBadges(user)}</p>
                    <p class="text-[8px] text-[#00a884] font-black">${user.id}</p>
                </div>
            </div>
            <button onclick="openChat('${user.id}')" class="bg-[#00a884] text-black text-[9px] px-3 py-1 rounded-lg font-black uppercase">Chatear</button>
        `;
    } else {
        alert("Usuario no encontrado");
        resultDiv.classList.add('hidden');
    }
}

// CHAT
function openChat(id) {
    talkingTo = id;
    const user = users.find(u => u.id === id);
    document.getElementById('no-chat').classList.add('hidden');
    document.getElementById('active-chat').classList.remove('hidden');
    document.getElementById('target-name').innerText = user.name;
    document.getElementById('target-id').innerText = user.id;
    document.getElementById('target-badges').innerHTML = getBadges(user);
    document.getElementById('target-avatar-ui').innerHTML = `<img src="${user.photo}" class="w-full h-full rounded-full">`;
    renderMsgs();
}

function sendMsg() {
    const input = document.getElementById('msg-input');
    if(!input.value.trim()) return;
    messages.push({ from: me.id, to: talkingTo, text: input.value.trim(), time: new Date() });
    input.value = "";
    save();
    renderMsgs();
}

function renderMsgs() {
    const flow = document.getElementById('messages-flow');
    const conv = messages.filter(m => (m.from === me.id && m.to === talkingTo) || (m.from === talkingTo && m.to === me.id));
    flow.innerHTML = conv.map(m => `
        <div class="flex flex-col ${m.from === me.id ? 'items-end' : 'items-start'}">
            <div class="${m.from === me.id ? 'bubble-out text-white' : 'bubble-in text-slate-200'} p-3 max-w-[80%] text-sm shadow-md">
                ${m.text}
            </div>
        </div>
    `).join('');
    flow.scrollTop = flow.scrollHeight;
}

function renderChats() {
    const list = document.getElementById('chats-list');
    const contacts = [...new Set(messages.filter(m => m.to === me.id || m.from === me.id).map(m => m.from === me.id ? m.to : m.from))];
    list.innerHTML = contacts.map(cid => {
        const u = users.find(x => x.id === cid);
        if(!u) return '';
        return `
            <div onclick="openChat('${u.id}')" class="p-4 flex items-center gap-3 hover:bg-[#202c33] cursor-pointer border-b border-white/5 ${talkingTo === u.id ? 'bg-[#202c33]' : ''}">
                <img src="${u.photo}" class="w-12 h-12 rounded-full">
                <div>
                    <p class="text-white text-sm font-bold flex items-center gap-1">${u.name} ${getBadges(u)}</p>
                    <p class="text-[10px] text-slate-500 uppercase font-black">${u.id}</p>
                </div>
            </div>
        `;
    }).join('');
}

// FUNCIONES ADMIN
function toggleGlobalMaint() {
    globalMaint = !globalMaint;
    save();
    renderAdmin();
}

function openAdminPanel() {
    const pass = prompt("INGRESE CLAVE MAESTRA:");
    if (pass === MASTER_KEY) {
        renderAdmin();
        document.getElementById('admin-modal').classList.remove('hidden');
    }
}

function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }

function renderAdmin() {
    const btn = document.getElementById('maint-toggle-btn');
    btn.innerText = globalMaint ? "QUITAR MANTENIMIENTO GLOBAL" : "ACTIVAR MANTENIMIENTO GLOBAL";
    btn.className = globalMaint ? "bg-green-600 px-6 py-3 rounded-xl text-[10px] text-white font-black uppercase" : "bg-red-600 px-6 py-3 rounded-xl text-[10px] text-white font-black uppercase";

    document.getElementById('admin-list').innerHTML = users.map(u => `
        <div class="p-6 bg-[#202c33] rounded-3xl border border-white/5 flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="${u.photo}" class="w-14 h-14 rounded-full border-2 ${u.id === MASTER_ID ? 'border-yellow-500' : 'border-transparent'}">
                    <div>
                        <div class="flex items-center gap-2">
                            <input onchange="updateUser('${u.id}', 'name', this.value)" value="${u.name}" class="bg-transparent border-b border-[#00a884] text-white font-bold outline-none">
                            <span class="text-[10px] text-[#00a884] font-black">${u.id}</span>
                        </div>
                        <input onchange="updateUser('${u.id}', 'pass', this.value)" value="${u.pass}" class="text-[10px] bg-transparent text-slate-500 outline-none">
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="banUser('${u.id}', '1m')" class="bg-orange-600 text-[8px] px-2 py-1 rounded font-black">BAN 1M</button>
                    <button onclick="banUser('${u.id}', 'perm')" class="bg-red-600 text-[8px] px-2 py-1 rounded font-black uppercase">PERMANENTE</button>
                    <button onclick="unbanUser('${u.id}')" class="bg-green-600 text-[8px] px-2 py-1 rounded font-black uppercase">UNBAN</button>
                </div>
            </div>
            <div class="flex items-center justify-between bg-black/20 p-3 rounded-xl">
                <p class="text-[10px] font-black uppercase text-slate-400">Verificados:</p>
                <div class="flex gap-4">
                    <button onclick="tag('${u.id}', 'gold')" class="${u.badges?.gold ? 'text-yellow-500' : 'text-slate-700'}">${ICONS.gold}</button>
                    <button onclick="tag('${u.id}', 'green')" class="${u.badges?.green ? 'text-green-500' : 'text-slate-700'}">${ICONS.green}</button>
                    <button onclick="tag('${u.id}', 'blue')" class="${u.badges?.blue ? 'text-blue-500' : 'text-slate-700'}">${ICONS.blue}</button>
                </div>
            </div>
        </div>
    `).join('');
}

function updateUser(id, key, val) {
    let u = users.find(x => x.id === id);
    u[key] = val;
    save();
}

function banUser(id, type) {
    if(id === MASTER_ID) return alert("NO PUEDES BANEAR AL DUEÑO");
    let u = users.find(x => x.id === id);
    u.isBanned = true;
    if(type === '1m') {
        let date = new Date();
        date.setMinutes(date.getMinutes() + 1);
        u.banUntil = date.toISOString();
    } else {
        u.banUntil = "perm";
    }
    save();
    renderAdmin();
}

function unbanUser(id) {
    let u = users.find(x => x.id === id);
    u.isBanned = false;
    u.banUntil = null;
    save();
    renderAdmin();
}

function tag(id, t) {
    let u = users.find(x => x.id === id);
    if(!u.badges) u.badges = {};
    u.badges[t] = !u.badges[t];
    save();
    renderAdmin();
}

function getBadges(u) {
    if(!u || !u.badges) return '';
    return (u.badges.gold?ICONS.gold:'') + (u.badges.blue?ICONS.blue:'') + (u.badges.green?ICONS.green:'');
}

// BUCLE DE ESTADO
setInterval(() => {
    if(!me) return;
    const currentMaint = JSON.parse(localStorage.getItem('za_maint'));
    const currentUsers = JSON.parse(localStorage.getItem('za_users'));
    const uNow = currentUsers.find(x => x.id === me.id);

    if (me.id !== MASTER_ID && (currentMaint || uNow.isBanned)) {
        document.getElementById('maint-screen').classList.remove('hidden');
    } else {
        document.getElementById('maint-screen').classList.add('hidden');
    }
    
    document.getElementById('my-badges').innerHTML = getBadges(uNow);
    renderChats();
}, 2000);
</script>
</body>
