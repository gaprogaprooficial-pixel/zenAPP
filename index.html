<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-opacity: 0.06; }
  .bubble-in { background-color: #202c33; border-radius: 0 15px 15px 15px; align-self: flex-start; }
  .bubble-out { background-color: #005c4b; border-radius: 15px 0 15px 15px; align-self: flex-end; }
  .v-gold { color: #facc15; filter: drop-shadow(0 0 3px #facc15); }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">
  <div id="app">
    <div id="login-screen" class="h-screen flex flex-col items-center justify-center">
      <h1 class="text-5xl font-black text-[#00a884] mb-8 uppercase italic tracking-widest">ZenMail</h1>
      <div class="bg-[#222e35] p-8 rounded-3xl w-[380px] border-t-4 border-[#00a884]">
        <input type="text" id="login-user" placeholder="Usuario" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-4 text-white">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-4 bg-[#2a3942] rounded-xl outline-none mb-6 text-white">
        <button onclick="auth()" class="w-full bg-[#00a884] py-4 rounded-xl font-black text-[#111b21] uppercase">Entrar</button>
      </div>
    </div>

    <div id="chat-interface" class="hidden h-screen flex">
      <aside class="w-[380px] border-r border-white/5 flex flex-col bg-[#111b21]">
        <header class="p-4 bg-[#202c33] flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img id="my-avatar" onclick="openAdminPanel()" class="w-11 h-11 rounded-full cursor-pointer border-2 border-[#00a884]">
                <div class="text-sm font-bold" id="my-name-display"></div>
            </div>
        </header>

        <div class="p-4 bg-[#1c282f] m-2 rounded-xl border border-[#00a884]/20">
            <p class="text-[10px] font-black text-[#00a884] uppercase mb-2">💎 Canje de Serial (XXX-AAA-XXX)</p>
            <div class="flex flex-col gap-2">
                <input type="text" id="promo-code" placeholder="Ej: 542-RTZ-991" class="bg-[#111b21] text-[10px] p-2 rounded-lg outline-none border border-white/10 uppercase">
                <button onclick="redeemSerial()" class="bg-yellow-500 text-black p-2 rounded-lg text-[9px] font-black uppercase">Validar Serial</button>
                <p id="shop-status" class="text-[8px] uppercase font-bold text-center"></p>
            </div>
        </div>
        <div id="chats-list" class="flex-1 overflow-y-auto"></div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper">
        <div class="flex-1 flex items-center justify-center text-slate-600 font-black text-xs uppercase">ZenMail v4.0 Serial System</div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-black/95 z-[1000] flex flex-col p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-[#00a884] font-black text-3xl uppercase italic">Panel Maestro</h2>
            <button onclick="closeAdmin()" class="text-white text-xs">CERRAR</button>
        </div>
        
        <div class="bg-[#222e35] p-6 rounded-2xl border border-white/5">
            <h3 class="text-yellow-500 font-bold mb-4 uppercase">Generador de 100,000 Códigos</h3>
            <p class="text-xs text-slate-400 mb-6">Presiona el botón para generar los seriales. Tardará unos segundos.</p>
            <button onclick="generateAndDownload()" class="bg-[#00a884] px-8 py-4 rounded-xl text-black font-black uppercase hover:bg-green-400 transition-all">
                Generar y Descargar .TXT
            </button>
        </div>
    </div>
  </div>

<script>
const MASTER_PASS = "ZM_X99_ROOT_#SECURITY_2026";
const MASTER_ID = "123-abc";

let users = JSON.parse(localStorage.getItem('zen_u')) || [];
let usedSerials = JSON.parse(localStorage.getItem('zen_used')) || [];
let me = null;

// LÓGICA DE VALIDACIÓN DE FORMATO 123-ABC-123
function redeemSerial() {
    const serial = document.getElementById('promo-code').value.trim().toUpperCase();
    const status = document.getElementById('shop-status');
    
    // RegEx para validar formato: 3 números - 3 letras - 3 números
    const regex = /^\d{3}-[A-Z]{3}-\d{3}$/;

    if (!regex.test(serial)) {
        status.innerText = "❌ FORMATO INCORRECTO (EJ: 123-ABC-123)";
        status.className = "text-red-500 text-[8px] font-bold text-center";
        return;
    }

    if (usedSerials.includes(serial)) {
        status.innerText = "❌ ESTE SERIAL YA FUE CANJEADO";
        status.className = "text-red-500 text-[8px] font-bold text-center";
        return;
    }

    // Si pasa las pruebas, activar Verificado Dorado
    let uNow = users.find(x => x.id === me.id);
    if(!uNow.badges) uNow.badges = {};
    uNow.badges.gold = true;
    
    usedSerials.push(serial);
    localStorage.setItem('zen_used', JSON.stringify(usedSerials));
    localStorage.setItem('zen_u', JSON.stringify(users));

    status.innerText = "✅ SERIAL ACTIVADO: RANGO ADMIN OBTENIDO";
    status.className = "text-green-500 text-[8px] font-bold text-center";
}

// GENERADOR MASIVO DE 100,000 CÓDIGOS DIFERENTES
function generateAndDownload() {
    let codes = [];
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    
    alert("Iniciando generación de 100,000 códigos... Por favor espera.");

    for(let i = 0; i < 100000; i++) {
        let n1 = Math.floor(Math.random() * 900 + 100); // 123
        let n2 = Math.floor(Math.random() * 900 + 100); // 456
        let l = letters[Math.floor(Math.random()*26)] + 
                letters[Math.floor(Math.random()*26)] + 
                letters[Math.floor(Math.random()*26)]; // ABC
        
        codes.push(`${n1}-${l}-${n2}`);
    }

    // Crear archivo descargable
    const blob = new Blob([codes.join('\n')], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = "codigos_zenmail_100k.txt";
    link.click();
    
    alert("¡Listo! Se ha descargado el archivo con tus 100,000 códigos únicos.");
}

function auth() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(u === "Admin" && p === "root") {
        me = users.find(x => x.id === MASTER_ID) || { id: MASTER_ID, name: "Admin", badges: {gold:true} };
    } else {
        me = { id: "ZEN-"+Math.floor(Math.random()*9000), name: u, badges: {} };
        users.push(me);
    }
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-interface').classList.remove('hidden');
    document.getElementById('my-name-display').innerText = me.name;
}

function openAdminPanel() { if(prompt("CLAVE ADMIN:") === MASTER_PASS) document.getElementById('admin-modal').classList.remove('hidden'); }
function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
</script>
</body>
