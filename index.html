<script src="https://cdn.tailwindcss.com"></script>
<style>
  .chat-wallpaper { background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-opacity: 0.05; }
  .v-gold { color: #facc15; filter: drop-shadow(0 0 4px #facc15); }
  .game-target { position: absolute; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: transform 0.1s; }
  .target-normal { background: radial-gradient(circle, #00ffcc, #00a884); box-shadow: 0 0 15px #00a884; }
  .target-bonus { background: radial-gradient(circle, #facc15, #eab308); box-shadow: 0 0 20px #facc15; animation: ping 1s infinite; }
  .target-danger { background: radial-gradient(circle, #ef4444, #991b1b); box-shadow: 0 0 15px #ef4444; }
  .zen-mail-window { background: #0b141a; border: 1px solid rgba(0, 168, 132, 0.2); box-shadow: 0 0 40px rgba(0,0,0,0.8); }
</style>

<body class="bg-[#111b21] font-sans text-slate-200 overflow-hidden">

  <div id="mail-modal" class="hidden fixed inset-0 z-[2000] flex items-center justify-center p-4 backdrop-blur-md bg-black/60">
      <div class="zen-mail-window w-full max-w-4xl h-[600px] rounded-[30px] flex flex-col overflow-hidden border-t-4 border-[#00a884]">
          <header class="p-6 bg-[#202c33] flex justify-between items-center">
              <div class="flex items-center gap-3">
                  <span class="text-3xl">📧</span>
                  <h2 class="text-2xl font-black italic tracking-tighter text-[#00a884]">ZENMAIL PRO</h2>
              </div>
              <button onclick="toggleMail()" class="bg-red-500/20 text-red-500 px-4 py-2 rounded-xl font-bold">CERRAR</button>
          </header>
          <div class="flex flex-1 overflow-hidden">
              <aside class="w-64 bg-black/20 p-4 border-r border-white/5 space-y-2">
                  <button class="w-full bg-[#00a884] text-black font-black p-3 rounded-xl text-xs uppercase">Redactar</button>
                  <div class="p-3 text-[#00a884] font-bold text-xs bg-[#00a884]/10 rounded-xl">Bandeja de Entrada</div>
                  <div class="p-3 text-slate-500 font-bold text-xs hover:bg-white/5 rounded-xl cursor-not-allowed">Enviados</div>
              </aside>
              <main class="flex-1 p-6 overflow-y-auto space-y-4 bg-[#111b21]">
                  <div class="p-4 bg-[#202c33] rounded-2xl border-l-4 border-[#00a884]">
                      <p class="text-[10px] text-[#00a884] font-bold">SISTEMA @ ZENAPP</p>
                      <h3 class="font-bold text-white">Bienvenido a ZenMail</h3>
                      <p class="text-sm text-slate-400 mt-2">Tu buzón de comunicaciones cifradas está activo. Los mensajes se auto-destruyen en 24h.</p>
                  </div>
              </main>
          </div>
      </div>
  </div>

  <div id="app">
    <div id="login-screen" class="h-screen flex flex-col items-center justify-center">
      <h1 class="text-7xl font-black text-[#00a884] mb-8 uppercase italic tracking-tighter">ZENAPP</h1>
      <div class="bg-[#222e35] p-10 rounded-[40px] w-[400px] shadow-2xl">
        <input type="text" id="login-user" placeholder="Usuario" class="w-full p-4 bg-[#2a3942] rounded-2xl outline-none mb-4 text-white">
        <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-4 bg-[#2a3942] rounded-2xl outline-none mb-8 text-white">
        <button onclick="auth()" class="w-full bg-[#00a884] py-5 rounded-2xl font-black text-[#111b21] uppercase text-lg shadow-lg">ENTRAR</button>
      </div>
    </div>

    <div id="chat-interface" class="hidden h-screen flex bg-[#111b21]">
      <aside class="w-[420px] border-r border-white/5 flex flex-col bg-[#111b21]">
        
        <header class="p-5 bg-[#202c33] flex justify-between items-center shadow-xl">
            <div class="flex items-center gap-4">
                <img id="my-avatar" onclick="openAdminPanel()" class="w-14 h-14 rounded-full cursor-pointer border-2 border-[#00a884]">
                <div class="flex flex-col gap-1">
                    <button onclick="toggleGame()" class="bg-[#2a3942] p-2 rounded-xl text-lg" title="Juegos">🎮</button>
                    <button onclick="toggleMail()" class="bg-[#2a3942] p-2 rounded-xl text-lg" title="ZenMail">📧</button>
                </div>
                <div>
                    <p id="my-name-display" class="font-bold text-white"></p>
                    <p id="my-id-display" class="text-[10px] text-[#00a884] font-black tracking-widest"></p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 p-2 rounded-lg text-[9px] font-black uppercase">Salir</button>
        </header>

        <div class="p-4 bg-[#111b21] border-b border-white/5">
            <div class="flex gap-2">
                <input type="text" id="user-search" placeholder="BUSCAR ID (ZEN-XXXX)" class="flex-1 bg-[#2a3942] p-3 rounded-xl text-xs outline-none text-white focus:ring-1 ring-[#00a884]">
                <button onclick="searchUser()" class="bg-[#00a884] text-black px-4 rounded-xl font-black text-[10px]">BUSCAR</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-2">
            <div id="search-result" class="hidden mb-4 p-4 bg-[#202c33] rounded-2xl border border-[#00a884]/30 flex justify-between items-center"></div>
            
            <div class="p-4 bg-red-600/5 rounded-3xl border border-red-500/10 mb-2">
                <input type="text" id="rep-id" placeholder="ID INFRACTOR" class="w-full bg-[#111b21] p-2 rounded-lg text-[10px] outline-none mb-2 border border-white/5">
                <button onclick="sendReport()" class="w-full bg-red-600 text-white p-2 rounded-lg text-[9px] font-black uppercase">Reportar</button>
            </div>

            <div class="p-4 bg-[#1c282f] rounded-3xl border border-yellow-500/10 mb-4">
                <input type="text" id="promo-code" placeholder="CÓDIGO VERIFICADO" class="w-full bg-[#111b21] p-2 rounded-lg text-[10px] outline-none mb-2 border border-white/5">
                <button onclick="redeemSerial()" class="w-full bg-yellow-500 text-black p-2 rounded-lg text-[9px] font-black uppercase">Activar</button>
            </div>

            <div id="chats-list" class="space-y-1"></div>
        </div>
      </aside>

      <main class="flex-1 flex flex-col chat-wallpaper relative">
        <div id="game-container" class="hidden absolute inset-0 bg-[#0b141a]/98 z-[100] flex flex-col items-center justify-center">
            <div class="absolute top-10 text-center pointer-events-none">
                <h2 class="text-4xl font-black text-[#00a884] italic">ZEN-CLICKER PRO</h2>
                <p class="text-6xl font-black text-white" id="game-score">0</p>
            </div>
            <div id="game-area" class="w-full h-full relative"></div>
            <button onclick="toggleGame()" class="absolute bottom-10 bg-red-600 px-8 py-3 rounded-2xl font-black">CERRAR JUEGO</button>
        </div>

        <div id="no-chat" class="flex-1 flex items-center justify-center text-slate-600 font-black text-xs tracking-[0.5em]">SELECCIONA UN CONTACTO</div>
        
        <div id="active-chat" class="hidden flex-1 flex flex-col h-full animate-fade-in">
            <header class="p-5 bg-[#202c33] flex items-center gap-4 shadow-2xl border-l border-white/5">
                <div id="target-avatar-ui" class="w-12 h-12"></div>
                <div>
                    <div class="flex items-center gap-1"><span id="target-name" class="font-bold text-white text-lg"></span><span id="target-badges"></span></div>
                    <span id="target-id" class="text-[10px] text-[#00a884] font-black"></span>
                </div>
            </header>
            <div id="messages-flow" class="flex-1 p-8 overflow-y-auto flex flex-col gap-3"></div>
            <div class="p-6 bg-[#202c33] flex gap-4">
                <input type="text" id="msg-input" placeholder="Mensaje..." class="flex-1 p-4 bg-[#2a3942] rounded-2xl outline-none text-white shadow-inner" onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" class="bg-[#00a884] text-black font-black px-10 rounded-2xl uppercase">Enviar</button>
            </div>
        </div>
      </main>
    </div>

    <div id="admin-modal" class="hidden fixed inset-0 bg-[#0b141a] z-[3000] p-10 flex flex-col overflow-hidden">
        <header class="flex justify-between items-center mb-10 border-b border-white/5 pb-6">
            <h2 class="text-[#00a884] font-black text-5xl uppercase italic tracking-tighter">CENTRO DE MANDO</h2>
            <div class="flex gap-4">
                <div class="bg-black/50 px-6 py-2 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] text-slate-500 font-bold">USUARIOS</p>
                    <p id="stat-u" class="text-xl font-black">0</p>
                </div>
                <button onclick="toggleMaint()" id="maint-btn" class="px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all"></button>
                <button onclick="closeAdmin()" class="bg-white/10 px-8 py-3 rounded-xl font-black text-[10px] uppercase">CERRAR</button>
            </div>
        </header>
        <div class="flex gap-10 h-full overflow-hidden">
            <div id="admin-list" class="flex-1 overflow-y-auto space-y-4 pr-4"></div>
            <div class="w-96 bg-black/40 rounded-[40px] border border-red-500/20 p-6 flex flex-col">
                <h3 class="text-red-500 font-black text-xs uppercase mb-4">🚨 REPORTES ACTIVOS</h3>
                <div id="report-list" class="flex-1 overflow-y-auto space-y-3"></div>
            </div>
        </div>
    </div>
  </div>

<script>
// --- CONFIG & DATA ---
const MASTER_KEY = "ZM_X99_ROOT_#SECURITY_2026";
const MASTER_ID = "123-abc";
const ICONS = { gold: '<span class="v-gold text-sm">★</span>', blue: '<span class="text-blue-500 text-sm">✔</span>', green: '<span class="text-green-500 text-sm">🛡</span>' };

let users = JSON.parse(localStorage.getItem('zen_u')) || [];
let messages = JSON.parse(localStorage.getItem('zen_m')) || [];
let reports = JSON.parse(localStorage.getItem('zen_reps')) || [];
let maint = JSON.parse(localStorage.getItem('zen_mt')) || false;
let me = null, talkingTo = null, score = 0;

if (!users.find(u => u.id === MASTER_ID)) {
    users.push({ id: MASTER_ID, name: "Admin", pass: "root", badges: {gold:true}, photo: "https://ui-avatars.com/api/?name=Admin&background=00a884&color=fff", isBan: false });
}
save();

function save() {
    localStorage.setItem('zen_u', JSON.stringify(users));
    localStorage.setItem('zen_m', JSON.stringify(messages));
    localStorage.setItem('zen_reps', JSON.stringify(reports));
    localStorage.setItem('zen_mt', JSON.stringify(maint));
}

// --- INSTANT MESSAGING ---
function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if(!text || !talkingTo) return;

    const newMsg = { from: me.id, to: talkingTo, text: text, time: Date.now() };
    messages.push(newMsg);
    input.value = "";
    save();
    
    // RENDER INMEDIATO
    renderMsgs(); 
    renderChats();
}

function renderMsgs() {
    const flow = document.getElementById('messages-flow');
    const conv = messages.filter(m => (m.from === me.id && m.to === talkingTo) || (m.from === talkingTo && m.to === me.id));
    flow.innerHTML = conv.map(m => `
        <div class="flex flex-col ${m.from === me.id ? 'items-end' : 'items-start'}">
            <div class="${m.from === me.id ? 'bg-[#005c4b]' : 'bg-[#202c33]'} p-4 rounded-2xl max-w-[75%] text-white shadow-lg animate-scale-in">
                ${m.text}
            </div>
        </div>
    `).join('');
    flow.scrollTop = flow.scrollHeight;
}

// --- SEARCH USER ---
function searchUser() {
    const q = document.getElementById('user-search').value.trim().toUpperCase();
    const res = document.getElementById('search-result');
    const u = users.find(x => x.id === q);
    
    if(u && u.id !== me.id) {
        res.classList.remove('hidden');
        res.innerHTML = `
            <div class="flex items-center gap-3">
                <img src="${u.photo}" class="w-10 h-10 rounded-full">
                <div><p class="text-white font-bold text-sm">${u.name}</p><p class="text-[10px] text-slate-500">${u.id}</p></div>
            </div>
            <button onclick="openChat('${u.id}')" class="bg-[#00a884] text-black px-4 py-2 rounded-xl text-[10px] font-black uppercase">Abrir Chat</button>
        `;
    } else { alert("Usuario no encontrado"); res.classList.add('hidden'); }
}

// --- ZENMAIL & GAME PRO ---
function toggleMail() { document.getElementById('mail-modal').classList.toggle('hidden'); }

function toggleGame() {
    const g = document.getElementById('game-container');
    g.classList.toggle('hidden');
    if(!g.classList.contains('hidden')) spawnObject();
}

function spawnObject() {
    const area = document.getElementById('game-area');
    area.innerHTML = "";
    const rand = Math.random();
    const obj = document.createElement('div');
    obj.className = "game-target";
    
    if (rand > 0.8) { // Bonus Gold (+5)
        obj.classList.add('target-bonus');
        obj.innerHTML = "⭐";
        obj.onclick = () => { score += 5; updateScore(); };
    } else if (rand < 0.2) { // Danger Red (-3)
        obj.classList.add('target-danger');
        obj.innerHTML = "💀";
        obj.onclick = () => { score -= 3; updateScore(); };
    } else { // Normal (+1)
        obj.classList.add('target-normal');
        obj.innerHTML = "ZEN";
        obj.onclick = () => { score += 1; updateScore(); };
    }

    obj.style.top = Math.random() * 70 + 15 + "%";
    obj.style.left = Math.random() * 70 + 15 + "%";
    area.appendChild(obj);
    
    // Auto-spawn si no se toca
    setTimeout(() => { if(obj.parentNode === area) spawnObject(); }, 1200);
}
function updateScore() { document.getElementById('game-score').innerText = score; spawnObject(); }

// --- ADMIN & AUTH (MANTENIDO) ---
function auth() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    if(!u || !p) return;
    let found = users.find(x => x.name.toLowerCase() === u.toLowerCase() && x.pass === p);
    if(found) { if(found.isBan) return alert("BANEADO"); me = found; }
    else { me = { id: "ZEN-"+Math.floor(1000+Math.random()*9000), name: u, pass: p, badges: {}, photo: "https://ui-avatars.com/api/?name="+u+"&background=random&color=fff", isBan: false }; users.push(me); }
    save();
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('chat-interface').classList.remove('hidden');
    document.getElementById('my-name-display').innerText = me.name;
    document.getElementById('my-id-display').innerText = me.id;
    document.getElementById('my-avatar').src = me.photo;
    renderChats();
}

function openChat(id) {
    talkingTo = id;
    const u = users.find(x => x.id === id);
    document.getElementById('no-chat').classList.add('hidden');
    document.getElementById('active-chat').classList.remove('hidden');
    document.getElementById('target-name').innerText = u.name;
    document.getElementById('target-id').innerText = u.id;
    document.getElementById('target-badges').innerHTML = getBadges(u);
    document.getElementById('target-avatar-ui').innerHTML = `<img src="${u.photo}" class="w-full h-full rounded-full border border-white/10">`;
    renderMsgs();
}

function renderChats() {
    const list = document.getElementById('chats-list');
    const contacts = [...new Set(messages.filter(m => m.to === me.id || m.from === me.id).map(m => m.from === me.id ? m.to : m.from))];
    list.innerHTML = contacts.map(cid => {
        const u = users.find(x => x.id === cid);
        if(!u) return '';
        return `<div onclick="openChat('${u.id}')" class="p-4 flex items-center gap-4 hover:bg-[#202c33] cursor-pointer rounded-2xl transition-all ${talkingTo === u.id ? 'bg-[#202c33] border-l-4 border-[#00a884]' : ''}"><img src="${u.photo}" class="w-12 h-12 rounded-full"><div><p class="text-white font-bold text-sm">${u.name} ${getBadges(u)}</p><p class="text-[10px] text-slate-500 uppercase">${u.id}</p></div></div>`;
    }).join('');
}

function renderAdmin() {
    document.getElementById('stat-u').innerText = users.length;
    const mb = document.getElementById('maint-btn');
    mb.innerText = maint ? "SISTEMA CERRADO" : "SISTEMA ABIERTO";
    mb.className = maint ? "bg-red-600 text-white" : "bg-[#00a884] text-black";
    
    document.getElementById('admin-list').innerHTML = users.map(u => `
        <div class="bg-[#202c33] p-5 rounded-3xl flex justify-between items-center border border-white/5 hover:border-[#00a884]/40 transition-all">
            <div class="flex items-center gap-4">
                <img src="${u.photo}" class="w-12 h-12 rounded-full border-2 ${u.id===MASTER_ID?'border-yellow-500':'border-white/10'}">
                <div>
                    <input onchange="editU('${u.id}','name',this.value)" value="${u.name}" class="bg-transparent text-white font-black outline-none border-b border-[#00a884]/30 w-32">
                    <p class="text-[10px] text-slate-500">${u.id}</p>
                    <input onchange="editU('${u.id}','pass',this.value)" value="${u.pass}" class="bg-transparent text-[8px] text-[#00a884] outline-none w-32">
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="flex gap-2">
                    <button onclick="tg('${u.id}','gold')" class="${u.badges?.gold?'v-gold':'opacity-20'} text-xl">★</button>
                    <button onclick="tg('${u.id}','green')" class="${u.badges?.green?'text-green-500':'opacity-20'} text-xl">🛡</button>
                </div>
                <button onclick="ban('${u.id}',${!u.isBan})" class="${u.isBan?'bg-green-600':'bg-red-600'} text-white text-[9px] px-4 py-2 rounded-xl font-black uppercase">${u.isBan?'Unban':'Ban'}</button>
            </div>
        </div>
    `).join('');

    document.getElementById('report-list').innerHTML = reports.map((r, i) => `
        <div class="p-4 bg-black/40 rounded-2xl border-l-4 border-red-500">
            <p class="text-[10px] font-black text-red-500 uppercase">Reportado: ${r.target}</p>
            <p class="text-xs text-slate-400 italic mt-1">"${r.reason}"</p>
            <button onclick="delRep(${i})" class="text-[8px] text-white/20 mt-2 uppercase">Cerrar Caso</button>
        </div>
    `).join('');
}

function openAdminPanel() { if(prompt("MASTER KEY:") === MASTER_KEY) { renderAdmin(); document.getElementById('admin-modal').classList.remove('hidden'); } }
function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
function toggleMaint() { maint = !maint; save(); renderAdmin(); }
function editU(id,k,v) { let u = users.find(x=>x.id===id); if(u) u[k]=v; save(); }
function ban(id,st) { if(id===MASTER_ID) return; let u = users.find(x=>x.id===id); u.isBan=st; save(); renderAdmin(); }
function tg(id,t) { let u = users.find(x=>x.id===id); if(!u.badges) u.badges={}; u.badges[t]=!u.badges[t]; save(); renderAdmin(); }
function delRep(i) { reports.splice(i,1); save(); renderAdmin(); }
function sendReport() {
    const id = document.getElementById('rep-id').value.trim().toUpperCase();
    if(!id) return;
    reports.push({ from: me.id, target: id, reason: "Denuncia de usuario" });
    save(); alert("REPORTE ENVIADO");
}
function redeemSerial() {
    const s = document.getElementById('promo-code').value.trim().toUpperCase();
    if (/^\d{3}-[A-Z]{3}-\d{3}$/.test(s)) {
        let uNow = users.find(x => x.id === me.id);
        uNow.badges = {gold:true}; save(); alert("✅ SERIAL VÁLIDO");
    }
}
function getBadges(u) { if(!u || !u.badges) return ''; return (u.badges.gold?ICONS.gold:'')+(u.badges.green?ICONS.green:'')+(u.badges.blue?ICONS.blue:''); }

setInterval(() => {
    if(!me) return;
    const cur = users.find(x=>x.id===me.id);
    if(me.id !== MASTER_ID && (maint || cur.isBan)) {
        document.body.innerHTML = `<div class="h-screen bg-black flex items-center justify-center text-red-600 font-black text-4xl uppercase italic">SISTEMA CERRADO / BANEADO</div>`;
    }
}, 3000);
</script>
</body>
